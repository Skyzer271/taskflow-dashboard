# Fly.io configuration for TaskFlow Dashboard
# https://fly.io/docs/reference/configuration/

# Change this if the name is already taken on Fly.io.
# Run: flyctl apps list
app = 'taskflow-dashboard'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = 'taskflow_data'
  destination = '/data'
  initial_size = '1gb'
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '256mb'
